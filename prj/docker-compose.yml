version: '3.8'

services:
  drivesafe:
    build: .
    container_name: drivesafe-app
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_HEADLESS=true
      - TZ=UTC
    volumes:
      - /dev/video0:/dev/video0  # Map camera device
      - ./logs:/app/logs
      - ./data:/app/data
    devices:
      - /dev/video0:/dev/video0  # Grant camera access
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Prometheus monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: drivesafe-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    restart: unless-stopped
